file_types:
  documents:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".pptx"
    - ".ppt"
    - ".txt"
    - ".md"
    - ".rtf"
  
  code:
    - ".py"
    - ".java"
    - ".cpp"
    - ".c"
    - ".h"
  
  data:
    - ".json"
    - ".yaml"
    - ".yml"
    - ".csv"

conversion:
  pdf:
    library: "pymupdf"
    extract_images: false
    preserve_layout: true
  
  docx:
    library: "python-docx"
    doc_to_docx: true
  
  pptx:
    library: "python-pptx"
    ppt_to_pptx: true
  
  unstructured:
    enabled: true
    chunking_strategy: "by_title"
    max_characters: 1500
    overlap: 100

target:
  github_repo: "HIT-A/HITA_RagData"
  branch: "main"
  commit_message_template: "Auto-ingest: {source_repo} ({date})"
  path_structure: "{source_repo}/converted/"

rag:
  auto_ingest: true
  collection: "hit-courses"
  chunk_size: 1400
  chunk_overlap: 200
  store_in_cos: true
  cos_prefix: "rag-content"